<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Payment Test - TektonNet</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
        background: #f0f0f0;
      }
      .container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: center;
      }
      button {
        padding: 1rem 2rem;
        font-size: 16px;
        background-color: #8a3ffc;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔐 Pay 0.01 Pi to TektonNet</h1>
      <p>Click below to simulate a transaction with your Pi Testnet wallet.</p>
      <button onclick="pay()">Pay Now</button>
    </div>

    <script>
      async function pay() {
        try {
          const scopes = ['username', 'payments'];
          const authResult = await Pi.authenticate(scopes, function (result) {
            console.log('Authenticated:', result);
          });

          const payment = await Pi.createPayment({
            amount: 0.01,
            memo: "Test payment to TektonNet",
            metadata: { type: "test" },
          });

          console.log("Payment successful:", payment);
          alert("Payment initiated. Check your Pi Testnet Wallet.");
        } catch (error) {
          console.error("Payment failed:", error);
          alert("Payment failed. See console for details.");
        }
      }

      Pi.init({ version: "2.0", sandbox: true });
    </script>
  </body>
</html>
